<div class="h-screen w-screen flex overflow-hidden">
	<app-menu></app-menu>

	<main class="bg-[#F3F4F6] h-full overflow-hidden w-full flex flex-col">
		<div class="flex flex-col w-full">
			<app-manager-top-panel></app-manager-top-panel>
		</div>

		<section class="bg-white rounded-3xl mt-5 mx-7 p-6 w-[calc(100%-56px)] min-h-0 flex-1 shadow-[0_16px_40px_rgba(15,23,42,0.08)] flex flex-col gap-5 overflow-hidden max-[900px]:m-4 max-[900px]:w-[calc(100%-32px)] max-[900px]:p-4">
			<div class="flex items-center gap-3 pb-4 border-b border-gray-200">
				<div class="w-[38px] h-[38px] rounded-[10px] flex items-center justify-center bg-linear-to-br from-[#6366f1] to-[#4338ca]">
					<span class="text-2xl" style="color: white; filter: brightness(1.2);"></span>
				</div>
				<div>
					<h1 class="text-2xl font-semibold text-[#111827] max-[900px]:text-[20px]">Todos os Clientes</h1>
					<p class="text-sm text-[#6b7280]">Lista completa de clientes sob sua gestão</p>
				</div>
			</div>

			<div class="flex gap-4 border-b border-gray-200">
				<button 
					[class]="page === 1 
						? 'px-4 py-2 text-sm font-semibold text-[#6366f1] border-b-2 border-[#6366f1]' 
						: 'px-4 py-2 text-sm font-semibold text-[#6b7280] hover:text-[#111827]'"
					(click)="switchPage(1)">
					Todos os Clientes
				</button>

				<button 
					[class]="page === 2 
						? 'px-4 py-2 text-sm font-semibold text-[#6366f1] border-b-2 border-[#6366f1]' 
						: 'px-4 py-2 text-sm font-semibold text-[#6b7280] hover:text-[#111827]'"
					(click)="switchPage(2)">
					Buscar Clientes
				</button>

				<button 
					[class]="page === 3 
						? 'px-4 py-2 text-sm font-semibold text-[#6366f1] border-b-2 border-[#6366f1]' 
						: 'px-4 py-2 text-sm font-semibold text-[#6b7280] hover:text-[#111827]'"
					(click)="switchPage(3)">
					Top 3 Clientes
				</button>
			</div>
			<div [ngSwitch]="page" class="flex item-center justify-center flex-1 min-h-0 overflow-y-auto pr-1">
				<div *ngSwitchCase="1" class="w-full h-full flex flex-col min-h-0">
					<div class="mb-4">
						<input 
							type="text" 
							placeholder="Buscar por CPF ou Nome..." 
							[(ngModel)]="searchTerm"
							class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-[#6366f1]"
						/>
					</div>

					<div class="rounded-2xl border border-[#e5e7eb] p-3.5 bg-white flex-1 min-h-0">
						<app-customers-list [customers]="filteredCustomers" view="manager" (customerSelected)="openCustomerDetails($event)"></app-customers-list>
					</div>

					<div *ngIf="selectedCustomer" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" (click)="closeCustomerDetails()">
						<div class="w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl bg-white p-6 shadow-2xl" (click)="$event.stopPropagation()">
							<div class="flex items-start justify-between gap-4 border-b border-gray-200 pb-4 mb-5">
								<div>
									<h2 class="text-2xl font-semibold text-[#111827]">Informações do Cliente</h2>
									<p class="text-sm text-[#6b7280]">Dados pessoais e da conta</p>
								</div>
								<button
									type="button"
									(click)="closeCustomerDetails()"
									class="h-9 px-3 rounded-lg bg-gray-100 hover:bg-gray-200 text-sm font-semibold cursor-pointer"
								>
									Fechar
								</button>
							</div>

							<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
								<div class="flex flex-col gap-1">
									<label class="text-sm font-semibold text-gray-600">Nome</label>
									<input [value]="selectedCustomer.name" readonly class="h-10 rounded-lg border border-gray-200 px-3 bg-gray-50" />
								</div>

								<div class="flex flex-col gap-1">
									<label class="text-sm font-semibold text-gray-600">CPF</label>
									<input [value]="formatCpf(selectedCustomer.cpf)" readonly class="h-10 rounded-lg border border-gray-200 px-3 bg-gray-50" />
								</div>

								<div class="flex flex-col gap-1">
									<label class="text-sm font-semibold text-gray-600">E-mail</label>
									<input [value]="selectedCustomer.email" readonly class="h-10 rounded-lg border border-gray-200 px-3 bg-gray-50" />
								</div>

								<div class="flex flex-col gap-1">
									<label class="text-sm font-semibold text-gray-600">Salário</label>
									<input [value]="formatCurrency(selectedCustomer.salary)" readonly class="h-10 rounded-lg border border-gray-200 px-3 bg-gray-50" />
								</div>

								<div class="flex flex-col gap-1">
									<label class="text-sm font-semibold text-gray-600">Número da Conta</label>
									<input [value]="selectedCustomer.numberAccount" readonly class="h-10 rounded-lg border border-gray-200 px-3 bg-gray-50" />
								</div>

								<div class="flex flex-col gap-1">
									<label class="text-sm font-semibold text-gray-600">Saldo</label>
									<input [value]="formatCurrency(selectedCustomer.balance)" readonly class="h-10 rounded-lg border border-gray-200 px-3 bg-gray-50" />
								</div>

								<div class="flex flex-col gap-1">
									<label class="text-sm font-semibold text-gray-600">Limite</label>
									<input [value]="formatCurrency(selectedCustomer.limit)" readonly class="h-10 rounded-lg border border-gray-200 px-3 bg-gray-50" />
								</div>

								<div class="flex flex-col gap-1">
									<label class="text-sm font-semibold text-gray-600">Cidade / Estado</label>
									<input [value]="(selectedCustomer.city || '-') + ' / ' + (selectedCustomer.state || '-')" readonly class="h-10 rounded-lg border border-gray-200 px-3 bg-gray-50" />
								</div>

								<div class="flex flex-col gap-1 md:col-span-2">
									<label class="text-sm font-semibold text-gray-600">Gerente Responsável</label>
									<input [value]="selectedCustomer.manager.name + ' - ' + formatCpf(selectedCustomer.manager.cpf)" readonly class="h-10 rounded-lg border border-gray-200 px-3 bg-gray-50" />
								</div>
							</div>
						</div>
					</div>
				</div>
				<div *ngSwitchCase="2" class="w-full">
					<app-manager-consultar-cliente></app-manager-consultar-cliente>
				</div>
				<div *ngSwitchCase="3">
					<app-top-clientes></app-top-clientes>
				</div>
				
			</div>
			
		</section>
	</main>
</div>

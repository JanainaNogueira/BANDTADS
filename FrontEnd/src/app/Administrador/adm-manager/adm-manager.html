<div class="h-screen w-screen flex overflow-hidden bg-[#F3F4F6] text-[#111827]">
	<app-menu></app-menu>

	<main class="h-full flex-1 overflow-y-auto p-4 md:p-6">
		<section class="mb-5 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
			<h1 class="text-2xl font-bold text-[#1F2937] md:text-3xl">Gerentes</h1>
			<button (click)="abrirModalCriar()"
				class="inline-flex cursor-pointer items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow transition hover:bg-indigo-700">
				<mat-icon>person_add</mat-icon>
				Novo Gerente
			</button>
		</section>

		<section class="mb-5 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
			<div class="inline-flex w-full flex-wrap gap-2 rounded-xl border border-[#E5E7EB] bg-white p-2 lg:w-auto">
				<button *ngFor="let tab of statusTabs" type="button"
					class="inline-flex cursor-pointer items-center gap-2 rounded-lg px-3 py-1.5 text-xs font-medium transition-colors"
					[ngClass]="selectedStatus === tab.key ? 'bg-[#EEF2FF] text-[#2F3F93]' : 'text-[#64748B] hover:bg-[#F1F5F9]'"
					(click)="selectStatus(tab.key)">
					<span>{{ tab.label }}</span>
					<span
						class="grid h-5 min-w-5 place-items-center rounded-full bg-[#EEF2F7] px-1 text-[11px] font-semibold text-[#64748B]">{{
						tab.count }}</span>
				</button>
			</div>

			<div class="flex w-full items-center gap-2 lg:w-auto">
				<input type="text" placeholder="Buscar gerentes..."
					class="h-10 w-full rounded-xl border border-[#E5E7EB] bg-white px-3 text-sm text-[#1F2937] outline-none transition focus:border-[#7890FF] focus:ring-2 focus:ring-[#7890FF]/20 md:w-72"
					[value]="searchTerm" (input)="searchTerm = $any($event.target).value" />
			</div>
		</section>

		<section class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">
			<article class="flex flex-col gap-4 rounded-2xl border border-[#E5EAF4] bg-white p-4 shadow-sm"
				*ngFor="let manager of filteredManagers">
				<header class="flex items-center gap-3">
					<div
						class="grid h-11 w-11 place-items-center rounded-full bg-gradient-to-br from-[#5D72FF] to-[#4B5DE0] text-sm font-bold text-white">
						{{ getInitials(manager.name) }}
					</div>

					<div>
						<h2 class="text-lg font-semibold text-[#1F2937]">{{ manager.name }}</h2>
						<span class="inline-flex rounded-full px-2 py-0.5 text-[11px] font-semibold" [ngClass]="{
								'bg-emerald-100 text-emerald-700': manager.status === 'active',
								'bg-slate-200 text-slate-600': manager.status === 'inactive'
							}">
							{{ getStatusLabel(manager.status) }}
						</span>
					</div>
				</header>

				<div class="space-y-2 text-sm text-[#64748B]">
					<p class="truncate">✉ {{ manager.email }}</p>
					<p>☎ {{ manager.phone }}</p>
				</div>

				<footer class="mt-auto flex items-center justify-between gap-2 border-t border-[#E9EDF5] pt-3">
					<button type="button"
						class="w-full cursor-pointer rounded-lg px-3 py-1.5 text-xs font-semibold text-[#64748B] transition hover:bg-[#F8FAFC]"
						(click)="abrirModalEditar(manager)">
						Editar
					</button>
					<button type="button"
						class="w-full cursor-pointer rounded-lg px-3 py-1.5 text-xs font-semibold text-red-600 transition hover:bg-red-50"
						(click)="abrirModalRemover(manager)">
						Remover
					</button>
				</footer>
			</article>
		</section>
	</main>
</div>

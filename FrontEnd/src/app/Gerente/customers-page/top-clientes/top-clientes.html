<main class="bg-gray-100 p-6 rounded-xl shadow-md w-full max-w-5xl w-[90%]">

  <!-- Titulo -->
  <div class="mb-6">
    <div class="flex items-center gap-2 bg-orange-400 text-white px-3 py-1 rounded w-fit">
      <mat-icon>emoji_events</mat-icon>
      <h2 class="font-semibold">Top 3 Melhores Clientes</h2>
    </div>

    <p class="text-gray-500 text-sm mt-2">
      Clientes com os maiores saldos em conta (todos os gerentes)
    </p>
  </div>

  <!-- LISTA -->
  <div 
    *ngFor="let cliente of top3; let i = index"
    class="bg-white rounded-xl border border-gray-200 p-5 mb-4 shadow-sm"
  >

    <!-- topo -->
    <div class="flex justify-between items-center mb-4">

      <div 
        class="flex items-center gap-2 px-3 py-1 rounded-lg shadow text-white"
        [ngClass]="{
          'bg-yellow-400': i === 0,
          'bg-gray-400': i === 1,
          'bg-orange-500': i === 2
        }"
      >
        <mat-icon>workspace_premium</mat-icon>
        <p class="font-medium">{{ i + 1 }}º Lugar</p>
      </div>

      <div class="text-right">
        <p class="text-xs text-gray-500">Saldo</p>
        <p class="bg-green-600 text-white px-3 py-1 rounded font-semibold">
          {{ formatarValor(cliente.balance) }}
        </p>
      </div>

    </div>

    <!-- dados -->
    <div class="grid grid-cols-4 gap-4 text-sm">

      <div>
        <span class="text-gray-400">Nome</span>
        <p class="font-medium">{{ cliente.name }}</p>
      </div>

      <div>
        <span class="text-gray-400">CPF</span>
        <p>{{ cliente.cpf }}</p>
      </div>

      <div>
        <span class="text-gray-400">Cidade</span>
        <p>{{ cliente.city }}</p>
      </div>

      <div>
        <span class="text-gray-400">Estado</span>
        <p>{{ cliente.state }}</p>
      </div>

    </div>

  </div>

</main>

version: "3.9"

services:

########## Databases #############

  mongo-auth:
    image: mongo:6
    ports:
      - "27018:27017"
    volumes:
      - mongo-auth-data:/data/db 
    networks:
      - bantads-network

  db-cliente:
    image: postgres:15
    environment:
      POSTGRES_DB: cliente_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - db-cliente-data:/var/lib/postgresql/data
    networks:
      - bantads-network
  
  db-conta:
    image: postgres:15
    environment:
      POSTGRES_DB: conta_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - db-conta-data:/var/lib/postgresql/data
    networks:
      - bantads-network

  mongo-conta:
    image: mongo:6
    ports:
      - "27019:27017"
    volumes:
      - mongo-conta-data:/data/db
    networks:
      - bantads-network

  db-gerente:
    image: postgres:15
    environment:
      POSTGRES_DB: gerente_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - db-gerente-data:/var/lib/postgresql/data
    networks:
      - bantads-network

####################################
  frontend:
    build: ./FrontEnd
    ports:
      - "4200:80"
    depends_on:
      - gateway
    networks:
      - bantads-network

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    networks:
      - bantads-network

  auth-service:
    build: ./BackEnd/auth-service
    ports:
      - "8081:8080"
    depends_on:
      - mongo-auth
    networks:
      - bantads-network
      
  cliente-service:
    build: ./BackEnd/cliente-service
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-cliente:5432/cliente_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - db-cliente
      - rabbitmq
    networks:
      - bantads-network
  
  conta-service:
    build: ./BackEnd/conta-service
    ports:
      - "8083:8080"
    environment:
      APP_DATASOURCE_WRITE_URL: jdbc:postgresql://db-conta:5432/conta_db
      APP_DATASOURCE_WRITE_USERNAME: root
      APP_DATASOURCE_WRITE_PASSWORD: root
      APP_DATASOURCE_READ_URL: jdbc:postgresql://db-conta:5432/conta_db
      APP_DATASOURCE_READ_USERNAME: root
      APP_DATASOURCE_READ_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - db-conta
      - mongo-conta
      - rabbitmq
    networks:
      - bantads-network
  
  gerente-service:
    build: ./BackEnd/gerente-service
    ports:
      - "8084:8080"
    depends_on:
      - db-gerente
      - rabbitmq
    networks:
      - bantads-network

  saga-service:
    build: ./BackEnd/saga-service
    ports:
      - "8090:8080"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
      cliente-service:
        condition: service_started
      conta-service:
        condition: service_started
    networks:
      - bantads-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - bantads-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-auth-data:
  db-cliente-data:
  db-conta-data:
  mongo-conta-data:
  db-gerente-data:

networks:
  bantads-network:
    driver: bridge
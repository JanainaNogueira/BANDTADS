<div>
    <div class="flex p-1 rounded-xl w-full max-w-md">
        <button
            *ngFor="let t of tipos"
            (click)="selecionarTipo(t.valor)"
            class="flex-1 py-2 transition cursor-pointer bg-white"
            [ngClass]="tipo === t.valor ? 'text-[#4F46E5] shadow font-medium' : 'text-gray-500'"
        >
            {{ t.label }}
        </button>
    </div>
    <app-form-login (loginSubmit)="fazerLogin($event)"></app-form-login>
</div>

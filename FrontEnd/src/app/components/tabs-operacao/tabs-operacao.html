<!-- Tabs -->
<div class="grid grid-cols-3 border-b border-gray-200">
    <a
        *ngFor="let tab of tabs"
        [routerLink]="tab.rota"
        routerLinkActive="text-[#6366F1] border-b-2 border-[#6366F1]"
        class="flex items-center justify-center gap-2 text-gray-500 hover:text-[#6366F1] transition-colors cursor-pointer pb-4">
        <mat-icon class="text-[20px]">{{ tab.icon }}</mat-icon>
        <span>{{ tab.label }}</span>
    </a>
</div>

<!-- Saldo -->
<div class="flex justify-end mt-4 mb-8">
    <span class="text-gray-600 text-sm">
        Saldo Atual: <strong>R$ {{ saldoAtual | number:'1.2-2' }}</strong>
    </span>
</div>

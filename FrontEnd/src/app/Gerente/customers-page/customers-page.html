<div class="h-screen w-screen flex overflow-hidden">
	<app-menu></app-menu>

	<main class="bg-[#F3F4F6] h-full overflow-y-auto w-full flex flex-col">
		<div class="flex flex-col w-full">
			<app-manager-top-panel></app-manager-top-panel>
		</div>

		<section class="bg-white rounded-3xl mt-5 mx-7 p-6 w-[calc(100%-56px)] min-h-[78%] shadow-[0_16px_40px_rgba(15,23,42,0.08)] flex flex-col gap-5 max-[900px]:m-4 max-[900px]:w-[calc(100%-32px)] max-[900px]:p-4">
			<div class="flex items-center gap-3 pb-4 border-b border-gray-200">
				<div class="w-[38px] h-[38px] rounded-[10px] flex items-center justify-center bg-linear-to-br from-[#6366f1] to-[#4338ca]">
					<span class="text-2xl" style="color: white; filter: brightness(1.2);">✨</span>
				</div>
				<div>
					<h1 class="text-2xl font-semibold text-[#111827] max-[900px]:text-[20px]">Todos os Clientes</h1>
					<p class="text-sm text-[#6b7280]">Lista completa de clientes sob sua gestão</p>
				</div>
			</div>

			<div class="flex gap-4 border-b border-gray-200">
				<button 
					[class]="page === 1 
						? 'px-4 py-2 text-sm font-semibold text-[#6366f1] border-b-2 border-[#6366f1]' 
						: 'px-4 py-2 text-sm font-semibold text-[#6b7280] hover:text-[#111827]'"
					(click)="switchPage(1)">
					Todos os Clientes
				</button>

				<button 
					[class]="page === 2 
						? 'px-4 py-2 text-sm font-semibold text-[#6366f1] border-b-2 border-[#6366f1]' 
						: 'px-4 py-2 text-sm font-semibold text-[#6b7280] hover:text-[#111827]'"
					(click)="switchPage(2)">
					Buscar Clientes
				</button>

				<button 
					[class]="page === 3 
						? 'px-4 py-2 text-sm font-semibold text-[#6366f1] border-b-2 border-[#6366f1]' 
						: 'px-4 py-2 text-sm font-semibold text-[#6b7280] hover:text-[#111827]'"
					(click)="switchPage(3)">
					Top 3 Clientes
				</button>
			</div>
			<div [ngSwitch]="page" class="flex item-center justify-center">
				<div *ngSwitchCase="1">
					<div class="mb-4">
						<input 
							type="text" 
							placeholder="Buscar por CPF ou Nome..." 
							[(ngModel)]="searchTerm"
							class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-[#6366f1]"
						/>
					</div>

					<div class="min-h-[70vh] rounded-2xl border border-[#e5e7eb] p-3.5 bg-white">
						<app-customers-list [customers]="filteredCustomers" view="manager"></app-customers-list>
					</div>
				</div>
				<div *ngSwitchCase="3">
					<app-top-clientes></app-top-clientes>
				</div>
				
			</div>
			
		</section>
	</main>
</div>

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.csr.html;

    location / {
        try_files $uri $uri/ /index.csr.html;
    }

    location /api/ {
        proxy_pass http://gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
spring.application.name=cliente-service

# PostgreSQL
spring.datasource.url=jdbc:postgresql://db-cliente:5432/cliente_db
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.data-locations=classpath:clienteData.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:seu-email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:sua-senha-de-app}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

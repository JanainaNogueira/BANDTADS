<div class="h-screen w-screen flex overflow-hidden bg-[#F3F4F6] text-[#111827]">
  <app-menu></app-menu>

  <main class="h-full flex-1 min-h-0 overflow-y-auto p-4 md:p-6">
    <section class="mb-5 flex flex-col md:flex-row items-center justify-between gap-4">
      <h1 class="text-2xl font-bold text-[#1F2937] md:text-3xl">Clientes</h1>
      
      <div class="relative w-full md:w-96">
        <input 
          type="text"
          [(ngModel)]="searchTerm"
          (input)="buscarClientes()"
          placeholder="Buscar por nome ou CPF..."
          class="w-full rounded-xl border border-gray-300 bg-white px-4 py-2 focus:border-[#1F2937] focus:outline-none shadow-sm"
        />
      </div>
    </section>

    <section class="rounded-3xl bg-white p-6 shadow-sm">
      <app-customers-list
        [customers]="filteredCustomers"
        view="admin"
        class="w-full">
      </app-customers-list>
    </section>
  </main>
</div>

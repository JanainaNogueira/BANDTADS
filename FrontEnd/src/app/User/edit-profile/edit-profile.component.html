<div class="flex h-screen bg-gray-100 ">

    <app-menu class="fixed left-0 top-0 h-screen w-56"></app-menu>
  
    <main class="flex-1 p-10 flex flex-col items-center ml-56 overflow-y-auto">
  
      <div class="w-full max-w-4xl">
        <h1 class="text-2xl font-bold">Configurações</h1>
        <p class="text-gray-500 mb-6">
          Altere suas informações de perfil e renda
        </p>
      </div>
  
      <div class="w-full max-w-4xl mx-auto mb-6">
        <div class="w-full flex flex-col gap-1 bg-white shadow-sm rounded-xl px-6 py-2">
          <div class="flex items-center gap-2 ml-[7%]">
            <div class="w-10 h-10 text-purple-600 flex items-center justify-center">
              👤
            </div>
            <span class="text-purple-600 font-semibold">Perfil</span>
          </div>
          <div class="h-0.5 w-60 bg-purple-500 rounded-full self-start"></div>
        </div>
      </div>
  
      <div class="bg-gradient-to-r from-indigo-500 to-purple-400 rounded-2xl p-6 mb-8 w-full max-w-4xl mx-auto shadow-lg">
        <div class="flex flex-col gap-6">
          <div>
            <p class="text-base font-semibold text-white">Informações da conta</p>
          </div>

          <div class="flex flex-col md:flex-row justify-between gap-6">
            <div>
              <p class="text-sm text-white/80">Saldo Atual</p>
              <h2 class="text-4xl font-bold text-white">R$24,582.50</h2>
              <p class="mt-4 font-semibold text-white">Maria Silva</p>
              <p class="text-sm text-white/80">CPF: 123.456.789-00</p>
            </div>

            <div class="self-start md:self-center">
              <p class="text-sm text-white/80">Limite de crédito total</p>
              <h2 class="text-4xl font-bold text-white">R$ 2250.00</h2>
            </div>
          </div>
        </div>
      </div>
  
      <!-- formulario -->
      <div class="bg-white p-8 rounded-xl shadow w-full max-w-4xl mx-auto">
  
        <div class="flex justify-between mb-6">
          <h2 class="font-semibold text-lg">Informações Pessoais</h2>
          <button (click)="toggleEditMode()"
            class="text-sm px-4 py-1.5 rounded-lg font-medium transition-colors text-white"
            [ngClass]="isEditMode
              ? 'bg-gray-400 hover:bg-gray-500'
              : 'bg-purple-600 hover:bg-purple-700'">
            {{ isEditMode ? 'Salvar' : 'Editar' }}
          </button>
        </div>
  
        <div class="grid gap-4">
  
          <div>
            <label class="text-sm text-gray-600">Nome Completo</label>
            <input
              type="text"
              class="w-full border rounded-lg p-2 mt-1"
              placeholder="John Doe"
              [disabled]="!isEditMode"
            >
          </div>
  
          <div>
            <label class="text-sm text-gray-600">Email</label>
            <input
              type="email"
              class="w-full border rounded-lg p-2 mt-1"
              placeholder="john@example.com"
              mask="*{1,}@*{1,}.*{1,}"
              [disabled]="!isEditMode"
            >
          </div>
  
          <div>
            <label class="text-sm text-gray-600">Telefone</label>
            <input
              type="text"
              class="w-full border rounded-lg p-2 mt-1"
              placeholder="(00) 00000-0000"
              mask="(00) 00000-0000"
              [disabled]="!isEditMode"
            >
          </div>
  
          <div>
            <label class="text-sm text-gray-600">Salário Mensal</label>
            <input
              type="text"
              class="w-full border rounded-lg p-2 mt-1"
              placeholder="R$ 0000,00"
              [disabled]="!isEditMode"
            >
          </div>
  
        </div>

        <!-- endereço com CEP -->
        <hr class="border-gray-200 mt-2 mb-4">
        <p class="text-sm font-semibold text-gray-700 mb-2">Endereço</p>
        <form [formGroup]="perfilForm" class="grid gap-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="text-sm text-gray-600" for="cep">CEP</label>
              <input
                id="cep"
                type="text"
                formControlName="cep"
                (blur)="consultaCEP()"
                (keydown.enter)="consultaCEP()"
                class="w-full border rounded-lg p-2 mt-1"
                placeholder="00000-000"
                mask="00000-000"
                [disabled]="!isEditMode"
              />
            </div>

            <div>
              <label class="text-sm text-gray-600" for="numero">Número</label>
              <input
                id="numero"
                type="text"
                formControlName="numero"
                class="w-full border rounded-lg p-2 mt-1"
                placeholder="123"
                [disabled]="!isEditMode"
              />
            </div>
          </div>

          <div>
            <label class="text-sm text-gray-600" for="rua">Rua / Logradouro</label>
            <input
              id="rua"
              type="text"
              formControlName="rua"
              class="w-full border rounded-lg p-2 mt-1 bg-gray-50"
              placeholder="Rua das Flores"
              [disabled]="true"
            />
          </div>

          <div>
            <label class="flex items-baseline justify-between text-sm text-gray-600" for="complemento">
              <span>Complemento</span>
              <span class="text-xs text-gray-400">(opcional)</span>
            </label>
            <input
              id="complemento"
              type="text"
              formControlName="complemento"
              class="w-full border rounded-lg p-2 mt-1"
              placeholder="Apto 42, Bloco B"
              [disabled]="!isEditMode"
            />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="text-sm text-gray-600" for="cidade">Cidade</label>
              <input
                id="cidade"
                type="text"
                formControlName="cidade"
                class="w-full border rounded-lg p-2 mt-1"
                placeholder="São Paulo"
                [disabled]="!isEditMode"
              />
            </div>

            <div>
              <label class="text-sm text-gray-600" for="estado">Estado</label>
              <select
                id="estado"
                formControlName="estado"
                class="w-full border rounded-lg p-2 mt-1 appearance-none"
                [disabled]="!isEditMode"
              >
                <option value="">Selecione</option>
                <option value="AC">AC</option>
                <option value="AL">AL</option>
                <option value="AP">AP</option>
                <option value="AM">AM</option>
                <option value="BA">BA</option>
                <option value="CE">CE</option>
                <option value="DF">DF</option>
                <option value="ES">ES</option>
                <option value="GO">GO</option>
                <option value="MA">MA</option>
                <option value="MT">MT</option>
                <option value="MS">MS</option>
                <option value="MG">MG</option>
                <option value="PA">PA</option>
                <option value="PB">PB</option>
                <option value="PR">PR</option>
                <option value="PE">PE</option>
                <option value="PI">PI</option>
                <option value="RJ">RJ</option>
                <option value="RN">RN</option>
                <option value="RS">RS</option>
                <option value="RO">RO</option>
                <option value="RR">RR</option>
                <option value="SC">SC</option>
                <option value="SP">SP</option>
                <option value="SE">SE</option>
                <option value="TO">TO</option>
              </select>
            </div>
          </div>
        </form>
  
      </div>
  
    </main>
  
  </div>

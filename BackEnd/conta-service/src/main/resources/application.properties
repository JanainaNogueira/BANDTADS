spring.application.name=conta-service

app.datasource.write.url=${APP_DATASOURCE_WRITE_URL:jdbc:postgresql://db-conta:5432/conta_db}
app.datasource.write.driver-class-name=${APP_DATASOURCE_WRITE_DRIVER_CLASS_NAME:org.postgresql.Driver}
app.datasource.write.username=${APP_DATASOURCE_WRITE_USERNAME:root}
app.datasource.write.password=${APP_DATASOURCE_WRITE_PASSWORD:root}

app.datasource.read.url=${APP_DATASOURCE_READ_URL:jdbc:postgresql://db-conta:5432/conta_db}
app.datasource.read.driver-class-name=${APP_DATASOURCE_READ_DRIVER_CLASS_NAME:org.postgresql.Driver}
app.datasource.read.username=${APP_DATASOURCE_READ_USERNAME:root}
app.datasource.read.password=${APP_DATASOURCE_READ_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/contaEscrita.sql
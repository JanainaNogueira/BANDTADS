spring.application.name=cliente-service

# PostgreSQL (no Docker o compose define SPRING_DATASOURCE_*; local: localhost com Postgres na 5432)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cliente_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update

# RabbitMQ (no Docker: SPRING_RABBITMQ_HOST=rabbitmq)
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}

# Mail (Gmail: senha de app; prefira variáveis de ambiente e nao commite credenciais)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:seu-email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:sua-senha-de-app}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
